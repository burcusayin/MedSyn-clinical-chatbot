log_format ztimed '$remote_addr - $host [$time_local] "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uht=$upstream_header_time urt=$upstream_response_time '
                  'ups="$upstream_addr" ws="$http_upgrade"';
access_log /var/log/nginx/access.log ztimed;
error_log  /var/log/nginx/error.log notice;

map $http_upgrade $connection_upgrade { 
  default upgrade; 
  '' close; 
  }

# Local HTTP (80) -> redirect
server {
  listen 80;
  listen [::]:80;
  location = /nginx-health { 
    return 200 'ok'; 
    add_header Content-Type text/plain; 
    }
  location / { 
    return 301 https://$host$request_uri; 
    }
}

# Primary entry (Tech terminates TLS at havel, we serve HTTP on 8080)
server {
  listen 8080 ssl;
  listen [::]:8080 ssl;
  server_name havel.disi.unitn.it;
  client_max_body_size 25m;

  ssl_certificate     /etc/ssl/fullchain.pem;
  ssl_certificate_key /etc/ssl/privkey.pem;

  # (optional but nice)
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  location /public/ { 
    alias /srv/public/; 
    access_log off; 
    expires 7d; 
    }

  location = /nginx-health { 
    return 200 'ok'; 
    add_header Content-Type text/plain; 
    }


  location / {
    proxy_pass http://web:8000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # streaming/SSE
    proxy_buffering off;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}
