log_format ztimed '$remote_addr - $host [$time_local] "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uht=$upstream_header_time urt=$upstream_response_time '
                  'ups="$upstream_addr" ws="$http_upgrade"';

access_log /var/log/nginx/access.log ztimed;
error_log  /var/log/nginx/error.log notice;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

#
# HTTP on port 80 – health + ACME
#
server {
  listen 80;
  listen [::]:80;

  # Health endpoint for Docker / internal checks
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'OK';
  }

  # ACME HTTP-01 challenges (if you use certbot webroot)
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    access_log off;
  }

  # Anything else on port 80 – just return OK
  # (you can change this to a redirect if you want)
  location / {
    access_log off;
    return 200 'OK';
  }
}

#
# HTTPS on port 8080 – main MedSyn app
# Tech maps public 443 -> host 8080, so external HTTPS hits here.
#
server {
  listen 8080 ssl;
  listen [::]:8080 ssl;

  server_name pizia.disi.unitn.it;
  client_max_body_size 25m;

  # Certificates from ./reverse-proxy/ssl_user -> /etc/ssl in the container
  ssl_certificate     /etc/ssl/fullchain.pem;
  ssl_certificate_key /etc/ssl/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Optional extra TLS tuning: ciphers, HSTS, etc.

  # Static public files
  location /public/ {
    alias /srv/public/;
    access_log off;
    expires 7d;
  }

  # Health endpoint also available over HTTPS (handy for manual tests)
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'OK';
  }

  # Main proxy to the Chainlit / MedSyn backend
  location / {
    proxy_pass http://web:8000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # Streaming / SSE
    proxy_buffering off;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}
